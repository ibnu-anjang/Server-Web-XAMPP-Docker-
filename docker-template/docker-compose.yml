services:

  # ─── PHP + Apache ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${PROJECT_NAME}_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html   # folder kodingan kamu ↔ container
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}

  # ─── MariaDB (lebih ringan dari MySQL, 100% kompatibel) ────────────────────
  db:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}_db
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql   # data DB persisten, tidak hilang saat container mati
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: ${PROJECT_NAME}_pma
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASS}   # auto-login, tidak perlu ketik di browser
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
